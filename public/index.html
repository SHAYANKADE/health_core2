<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>داشبورد زنده پالس‌اکسیمتر</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Tahoma, Arial, sans-serif;
    background: #0f1115;
    color: #e8e8e8;
    text-align: center;
    padding: 24px 16px;
    margin: 0;
  }
  h1 { font-weight: 500; margin-bottom: 8px; }
  .cards {
    display: grid;
    grid-template-columns: repeat(2, minmax(160px, 1fr));
    gap: 16px;
    max-width: 520px;
    margin: 20px auto;
  }
  .card {
    background: #1c1f26;
    border-radius: 16px;
    padding: 20px 24px;
    min-height: 150px;
    transition: box-shadow 0.3s ease;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #coCard {
  }
  .label { font-size: 14px; color: #9aa0aa; margin-bottom: 8px; }
  .value { font-size: 42px; font-weight: 700; }
  .bpm   { color: #ff5c5c; }
  .spo2  { color: #4da3ff; }
  .co    { color: #3ddc84; transition: color 0.3s ease; }
  .co-sub { font-size: 12px; color: #9aa0aa; margin-top: 6px; min-height: 14px; }
  .status { font-size: 13px; color: #9aa0aa; margin-bottom: 8px; }
  .chart-wrap {
    max-width: 900px;
    margin: 0 auto;
    background: #1c1f26;
    border-radius: 16px;
    padding: 16px;
  }
  .legend { display: flex; justify-content: center; gap: 20px; margin-top: 8px; font-size: 13px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  canvas { width: 100%; height: 220px; display: block; }

  .co-card-ok    { box-shadow: 0 0 0 2px #3ddc8433; }
  .co-card-warn  { box-shadow: 0 0 0 2px #f5c542aa; }
  .co-card-alert { box-shadow: 0 0 0 2px #ff5c5caa; }

  .pulse-text {
    font-size: 18px;
    line-height: 1.6;
    min-height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pulse-card-none   { box-shadow: 0 0 0 2px #9aa0aa55; }
  .pulse-card-ok     { box-shadow: 0 0 0 2px #3ddc8433; }
  .pulse-card-danger {
    box-shadow: 0 0 0 2px #ff5c5c;
    animation: pulseBlink 1s infinite;
  }
  @keyframes pulseBlink {
    0%, 100% { box-shadow: 0 0 0 2px #ff5c5c; }
    50%      { box-shadow: 0 0 0 4px #ff2020; }
  }

  #enableSoundBtn {
    display: none;
  }
  .mute-btn {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    background: #12141a;
    border: 2px solid #454b57;
    color: #e8e8e8;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    flex-shrink: 0;
    margin-top: 14px;
  }
  .mute-btn.sound-on {
    border-color: #3ddc84;
  }
</style>
</head>
<body>

<div style="display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap;">
  <h1>❤️ داشبورد زنده پالس‌اکسیمتر</h1>
  <button id="muteBtn" class="mute-btn" onclick="toggleSound()" title="فعال/غیرفعال کردن هشدار صوتی">🔇</button>
</div>
<div class="status" id="status">در حال اتصال...</div>

<div class="cards">
  <div class="card">
    <div class="label">اشباع اکسیژن (FSpO2)</div>
    <div class="value spo2" id="fspo2">--</div>
  </div>
  <div class="card">
    <div class="label">ضربان قلب (BPM)</div>
    <div class="value bpm" id="bpm">--</div>
  </div>
  <div class="card" id="pulseCard">
    <div class="label">وضعیت نبض</div>
    <div class="value pulse-text" id="pulseText">--</div>
  </div>
  <div class="card" id="coCard">
    <div class="label">مونوکسید کربن (CO ppm)</div>
    <div class="value co" id="co">--</div>
    <div class="co-sub" id="coStatus"></div>
  </div>
</div>

<audio id="alarmAudio" src="alarm.wav" loop preload="auto"></audio>

<div class="chart-wrap">
  <canvas id="liveChart"></canvas>
  <div class="legend">
    <span><span class="dot" style="background:#ff5c5c"></span> BPM</span>
    <span><span class="dot" style="background:#4da3ff"></span> SpO2 %</span>
  </div>
</div>

<div class="chart-wrap" style="margin-top: 16px;">
  <canvas id="waveChart"></canvas>
  <div class="legend">
    <span><span class="dot" style="background:#3ddc84"></span> شکل موج نبض (PPG)</span>
  </div>
</div>

<script>
// ---------------------------------------------------------------
// نمودار زنده‌ی ساده - کاملاً با جاوااسکریپت خالص، بدون هیچ
// کتابخونه‌ی خارجی (تا وابسته به CDN بیرونی که ممکنه فیلتر باشه نباشیم)
// ---------------------------------------------------------------
const MAX_POINTS = 30;
const bpmData = [];
const spo2Data = [];

const canvas = document.getElementById('liveChart');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawChart();
}
window.addEventListener('resize', resizeCanvas);

// ---------------------------------------------------------------
// نمودار شکل موج نبض (PPG) - همون داده‌ی خامی که روی OLED دیده می‌شه،
// هر بار که یک بسته‌ی جدید از بورد می‌رسه (هر ~1 ثانیه) کامل بازرسم می‌شه
// ---------------------------------------------------------------
const waveCanvas = document.getElementById('waveChart');
const waveCtx = waveCanvas.getContext('2d');
let lastWave = null;

function resizeWaveCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = waveCanvas.getBoundingClientRect();
  waveCanvas.width = rect.width * dpr;
  waveCanvas.height = rect.height * dpr;
  waveCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawWave(lastWave);
}
window.addEventListener('resize', resizeWaveCanvas);

function drawWave(waveArr) {
  const w = waveCanvas.getBoundingClientRect().width;
  const h = waveCanvas.getBoundingClientRect().height;
  waveCtx.clearRect(0, 0, w, h);

  waveCtx.strokeStyle = '#2a2e37';
  waveCtx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = (h / 4) * i;
    waveCtx.beginPath();
    waveCtx.moveTo(0, y);
    waveCtx.lineTo(w, y);
    waveCtx.stroke();
  }

  if (!waveArr || waveArr.length < 2) return;

  const minV = Math.min(...waveArr);
  const maxV = Math.max(...waveArr);
  const range = (maxV - minV) || 1;

  waveCtx.strokeStyle = '#3ddc84';
  waveCtx.lineWidth = 2;
  waveCtx.beginPath();
  waveArr.forEach((val, i) => {
    const x = (i / (waveArr.length - 1)) * w;
    const y = h - ((val - minV) / range) * h;
    if (i === 0) waveCtx.moveTo(x, y);
    else waveCtx.lineTo(x, y);
  });
  waveCtx.stroke();
}

function drawChart() {
  const w = canvas.getBoundingClientRect().width;
  const h = canvas.getBoundingClientRect().height;
  ctx.clearRect(0, 0, w, h);

  // خطوط راهنمای افقی
  ctx.strokeStyle = '#2a2e37';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = (h / 4) * i;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  if (bpmData.length < 2) return;

  const allValues = [...bpmData, ...spo2Data].filter(v => v != null);
  if (allValues.length === 0) return;
  const minV = Math.min(...allValues) - 5;
  const maxV = Math.max(...allValues) + 5;
  const range = maxV - minV || 1;

  function drawLine(data, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    data.forEach((val, i) => {
      if (val == null) return;
      const x = (i / (MAX_POINTS - 1)) * w;
      const y = h - ((val - minV) / range) * h;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  drawLine(bpmData, '#ff5c5c');
  drawLine(spo2Data, '#4da3ff');
}

// ---------------------------------------------------------------
// آژیر صوتی سایت - پخش فایل alarm.wav (لوپ‌شونده)، کنترل با دکمه‌ی
// کوچک داخل کارت CO. مرورگرها بدون یک تعامل کاربر اجازه‌ی پخش خودکار
// صدا نمی‌دن، برای همین کلیک روی دکمه هم فعال/غیرفعال می‌کنه و هم
// (بار اول) اجازه‌ی پخش رو از مرورگر می‌گیره.
// ---------------------------------------------------------------
const alarmAudio = document.getElementById('alarmAudio');
let soundEnabled = false;
let alarmActive = false;
let coAlarmOn = false;
let pulseAlarmOn = false;

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('muteBtn');
  btn.textContent = soundEnabled ? '🔊' : '🔇';
  btn.classList.toggle('sound-on', soundEnabled);

  if (soundEnabled) {
    if (alarmActive) {
      alarmAudio.currentTime = 0;
      alarmAudio.play().catch(() => {});
    } else {
      // یک play/pause سریع فقط برای گرفتن اجازه‌ی پخش از مرورگر
      alarmAudio.play().then(() => alarmAudio.pause()).catch(() => {});
    }
  } else {
    alarmAudio.pause();
  }
}

function updateSirenState() {
  const shouldAlarm = coAlarmOn || pulseAlarmOn;
  if (shouldAlarm === alarmActive) return;
  alarmActive = shouldAlarm;

  if (alarmActive && soundEnabled) {
    alarmAudio.currentTime = 0;
    alarmAudio.play().catch(() => {});
  } else if (!alarmActive) {
    alarmAudio.pause();
  }
}

// ---------------------------------------------------------------
// وضعیت نبض: 0 = انگشت روی سنسور نیست، 1 = نبض طبیعی، 2 = نبض قطع (خطر)
// ---------------------------------------------------------------
function updatePulseDisplay(status) {
  const textEl = document.getElementById('pulseText');
  const cardEl = document.getElementById('pulseCard');
  cardEl.classList.remove('pulse-card-none', 'pulse-card-ok', 'pulse-card-danger');

  if (status === 2) {
    textEl.textContent = '🚨 نبض قطع شده - خطر مرگ';
    textEl.style.color = '#ff5c5c';
    cardEl.classList.add('pulse-card-danger');
    pulseAlarmOn = true;
  } else if (status === 1) {
    textEl.textContent = 'انگشت قرار گرفته - نبض طبیعی';
    textEl.style.color = '#3ddc84';
    cardEl.classList.add('pulse-card-ok');
    pulseAlarmOn = false;
  } else {
    textEl.textContent = 'انگشت شناسایی نشد';
    textEl.style.color = '#9aa0aa';
    cardEl.classList.add('pulse-card-none');
    pulseAlarmOn = false;
  }
  updateSirenState();
}

// ---------------------------------------------------------------
// وضعیت رنگی CO بر اساس آستانه‌های استاندارد سلامتی
// ---------------------------------------------------------------
function updateCoDisplay(ppm) {
  const coEl = document.getElementById('co');
  const subEl = document.getElementById('coStatus');
  const cardEl = document.getElementById('coCard');

  coEl.textContent = (ppm ?? '--');
  cardEl.classList.remove('co-card-ok', 'co-card-warn', 'co-card-alert');

  if (ppm == null) {
    coEl.style.color = '#9aa0aa';
    subEl.textContent = '';
    coAlarmOn = false;
    updateSirenState();
    return;
  }

  // هیسترزیس برای جلوگیری از نوسان آژیر دور و بر آستانه: روی 100 روشن می‌شه،
  // ولی فقط وقتی به زیر 90 برسه خاموش می‌شه. این از ری‌استارت مکرر صدا
  // به‌خاطر نویز طبیعی سنسور دور و بر عدد 100 جلوگیری می‌کنه.
  if (ppm >= 100) {
    coAlarmOn = true;
  } else if (ppm < 90) {
    coAlarmOn = false;
  }
  // بین 90 تا 100: وضعیت قبلی آژیر دست‌نخورده می‌مونه (منطقه‌ی بی‌تفاوت)

  if (ppm < 9) {
    coEl.style.color = '#3ddc84';
    subEl.textContent = 'طبیعی';
    cardEl.classList.add('co-card-ok');
  } else if (ppm < 35) {
    coEl.style.color = '#f5c542';
    subEl.textContent = 'قابل قبول - تهویه شود';
    cardEl.classList.add('co-card-warn');
  } else if (ppm < 100) {
    coEl.style.color = '#ff9d42';
    subEl.textContent = '⚠️ هشدار';
    cardEl.classList.add('co-card-warn');
  } else {
    coEl.style.color = '#ff5c5c';
    subEl.textContent = '🚨 خطر - آژیر فعال';
    cardEl.classList.add('co-card-alert');
  }
  updateSirenState();
}

let lastTs = null;

async function updateLive() {
  try {
    const res = await fetch('/api/readings/latest');
    const d = await res.json();

    if (d && typeof d.bpm === 'number') {
      document.getElementById('bpm').textContent = d.bpm;
      document.getElementById('fspo2').textContent = d.fspo2 ?? d.spo2 ?? '--';
      updateCoDisplay(typeof d.co_ppm === 'number' ? Math.round(d.co_ppm) : null);
      updatePulseDisplay(typeof d.pulse_status === 'number' ? d.pulse_status : 0);

      const age = Math.round((Date.now() - d.ts) / 1000);
      document.getElementById('status').textContent =
        age < 10 ? '🟢 زنده - آخرین بروزرسانی ' + age + ' ثانیه پیش'
                  : '🟠 آخرین داده ' + age + ' ثانیه پیش (ممکنه دستگاه آفلاین باشه)';

      const pulseStatus = typeof d.pulse_status === 'number' ? d.pulse_status : 0;

      if (d.ts !== lastTs) {
        lastTs = d.ts;

        // فقط وقتی انگشت کلاً روی سنسور نیست (pulse_status=0) نمودار متوقف می‌مونه.
        // توی حالت قطع نبض (pulse_status=2) هم دیتا ارسال می‌شه و یه خط صاف
        // کشیده می‌شه تا مشخص باشه مقدار ثابت مونده و چند وقته این‌طوریه.
        if (pulseStatus === 1 || pulseStatus === 2) {
          bpmData.push(d.bpm);
          spo2Data.push(d.fspo2 ?? d.spo2);
          if (bpmData.length > MAX_POINTS) bpmData.shift();
          if (spo2Data.length > MAX_POINTS) spo2Data.shift();
          drawChart();
        }

        if ((pulseStatus === 1 || pulseStatus === 2) && Array.isArray(d.wave) && d.wave.length > 1) {
          lastWave = d.wave;
          drawWave(lastWave);
        }
      }
    } else {
      document.getElementById('status').textContent = '⚪ هنوز داده‌ای دریافت نشده';
    }
  } catch (e) {
    document.getElementById('status').textContent = '🔴 خطا در اتصال به سرور';
  }
}

resizeCanvas();
resizeWaveCanvas();
updateLive();
setInterval(updateLive, 2000);
</script>

</body>
</html>
