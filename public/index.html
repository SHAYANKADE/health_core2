<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>داشبورد زنده پالس‌اکسیمتر</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Tahoma, Arial, sans-serif;
    background: #0f1115;
    color: #e8e8e8;
    text-align: center;
    padding: 24px 16px;
    margin: 0;
  }
  h1 { font-weight: 500; margin-bottom: 8px; }
  .cards { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin: 20px 0; }
  .card {
    background: #1c1f26;
    border-radius: 16px;
    padding: 20px 36px;
    min-width: 140px;
  }
  .label { font-size: 14px; color: #9aa0aa; margin-bottom: 8px; }
  .value { font-size: 42px; font-weight: 700; }
  .bpm   { color: #ff5c5c; }
  .spo2  { color: #4da3ff; }
  .status { font-size: 13px; color: #9aa0aa; margin-bottom: 8px; }
  .chart-wrap {
    max-width: 900px;
    margin: 0 auto;
    background: #1c1f26;
    border-radius: 16px;
    padding: 16px;
  }
  .legend { display: flex; justify-content: center; gap: 20px; margin-top: 8px; font-size: 13px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  canvas { width: 100%; height: 220px; display: block; }
</style>
</head>
<body>

<h1>❤️ داشبورد زنده پالس‌اکسیمتر</h1>
<div class="status" id="status">در حال اتصال...</div>

<div class="cards">
  <div class="card">
    <div class="label">ضربان قلب (BPM)</div>
    <div class="value bpm" id="bpm">--</div>
  </div>
  <div class="card">
    <div class="label">اشباع اکسیژن (FSpO2)</div>
    <div class="value spo2" id="fspo2">--</div>
  </div>
</div>

<div class="chart-wrap">
  <canvas id="liveChart"></canvas>
  <div class="legend">
    <span><span class="dot" style="background:#ff5c5c"></span> BPM</span>
    <span><span class="dot" style="background:#4da3ff"></span> SpO2 %</span>
  </div>
</div>

<script>
// ---------------------------------------------------------------
// نمودار زنده‌ی ساده - کاملاً با جاوااسکریپت خالص، بدون هیچ
// کتابخونه‌ی خارجی (تا وابسته به CDN بیرونی که ممکنه فیلتر باشه نباشیم)
// ---------------------------------------------------------------
const MAX_POINTS = 30;
const bpmData = [];
const spo2Data = [];

const canvas = document.getElementById('liveChart');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawChart();
}
window.addEventListener('resize', resizeCanvas);

function drawChart() {
  const w = canvas.getBoundingClientRect().width;
  const h = canvas.getBoundingClientRect().height;
  ctx.clearRect(0, 0, w, h);

  // خطوط راهنمای افقی
  ctx.strokeStyle = '#2a2e37';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = (h / 4) * i;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  if (bpmData.length < 2) return;

  const allValues = [...bpmData, ...spo2Data].filter(v => v != null);
  if (allValues.length === 0) return;
  const minV = Math.min(...allValues) - 5;
  const maxV = Math.max(...allValues) + 5;
  const range = maxV - minV || 1;

  function drawLine(data, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    data.forEach((val, i) => {
      if (val == null) return;
      const x = (i / (MAX_POINTS - 1)) * w;
      const y = h - ((val - minV) / range) * h;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  drawLine(bpmData, '#ff5c5c');
  drawLine(spo2Data, '#4da3ff');
}

let lastTs = null;

async function updateLive() {
  try {
    const res = await fetch('/api/readings/latest');
    const d = await res.json();

    if (d && typeof d.bpm === 'number') {
      document.getElementById('bpm').textContent = d.bpm;
      document.getElementById('fspo2').textContent = d.fspo2 ?? d.spo2 ?? '--';

      const age = Math.round((Date.now() - d.ts) / 1000);
      document.getElementById('status').textContent =
        age < 10 ? '🟢 زنده - آخرین بروزرسانی ' + age + ' ثانیه پیش'
                  : '🟠 آخرین داده ' + age + ' ثانیه پیش (ممکنه دستگاه آفلاین باشه)';

      if (d.ts !== lastTs) {
        lastTs = d.ts;
        bpmData.push(d.bpm);
        spo2Data.push(d.fspo2 ?? d.spo2);
        if (bpmData.length > MAX_POINTS) bpmData.shift();
        if (spo2Data.length > MAX_POINTS) spo2Data.shift();
        drawChart();
      }
    } else {
      document.getElementById('status').textContent = '⚪ هنوز داده‌ای دریافت نشده';
    }
  } catch (e) {
    document.getElementById('status').textContent = '🔴 خطا در اتصال به سرور';
  }
}

resizeCanvas();
updateLive();
setInterval(updateLive, 2000);
</script>

</body>
</html>
