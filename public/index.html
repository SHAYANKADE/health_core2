<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>داشبورد زنده پالس‌اکسیمتر</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Tahoma, Arial, sans-serif;
    background: #0f1115;
    color: #e8e8e8;
    text-align: center;
    padding: 24px 16px;
    margin: 0;
  }
  h1 { 
    font-weight: 500; 
    margin-bottom: 8px; 
    color: #ff5c5c;
  }
  .status { 
    font-size: 14px; 
    color: #9aa0aa; 
    margin-bottom: 20px; 
  }
  .cards { 
    display: flex; 
    justify-content: center; 
    gap: 24px; 
    flex-wrap: wrap; 
    margin: 30px 0 40px 0; 
  }
  .card {
    background: #1c1f26;
    border-radius: 20px;
    padding: 30px 50px;
    min-width: 180px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: transform 0.2s;
  }
  .card:hover {
    transform: scale(1.03);
  }
  .label { 
    font-size: 16px; 
    color: #9aa0aa; 
    margin-bottom: 12px; 
    letter-spacing: 0.5px;
  }
  .value { 
    font-size: 56px; 
    font-weight: 700; 
    letter-spacing: 2px;
  }
  .bpm   { color: #ff5c5c; }
  .spo2  { color: #4da3ff; }
  .unit {
    font-size: 20px;
    color: #9aa0aa;
    margin-right: 4px;
  }
  .last-update {
    font-size: 13px;
    color: #6b7280;
    margin-top: 20px;
  }
  .status-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-left: 8px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
    100% { opacity: 0.3; transform: scale(1); }
  }
  .online .status-dot { background: #4ade80; }
  .offline .status-dot { background: #f87171; animation: none; }
  .waiting .status-dot { background: #fbbf24; }
</style>
</head>
<body>

<h1>❤️ داشبورد زنده پالس‌اکسیمتر</h1>
<div class="status" id="status">
  <span class="status-dot"></span>
  در حال اتصال...
</div>

<div class="cards">
  <div class="card">
    <div class="label">ضربان قلب</div>
    <div class="value bpm" id="bpm">--</div>
  </div>
  <div class="card">
    <div class="label">اشباع اکسیژن</div>
    <div class="value spo2" id="fspo2">--</div>
  </div>
</div>

<div class="last-update" id="lastUpdate">منتظر دریافت داده...</div>

<script>
let lastTs = null;

function updateStatus(text, className) {
  const statusEl = document.getElementById('status');
  statusEl.className = 'status ' + className;
  // جدا کردن ایموجی از متن
  const cleanText = text.replace(/[🟢🔴🟠⚪]/g, '').trim();
  statusEl.innerHTML = `<span class="status-dot"></span> ${cleanText}`;
}

async function updateLive() {
  try {
    const res = await fetch('/api/readings/latest');
    if (!res.ok) throw new Error('Network error');
    
    const d = await res.json();

    if (d && typeof d.bpm === 'number') {
      // بروزرسانی اعداد
      document.getElementById('bpm').textContent = d.bpm;
      document.getElementById('fspo2').textContent = d.fspo2 ?? d.spo2 ?? '--';

      // بروزرسانی زمان
      const age = Math.round((Date.now() - d.ts) / 1000);
      const updateEl = document.getElementById('lastUpdate');
      
      if (age < 10) {
        updateStatus('زنده - آخرین بروزرسانی ' + age + ' ثانیه پیش', 'online');
        updateEl.textContent = '🟢 اتصال برقرار';
        updateEl.style.color = '#4ade80';
      } else if (age < 30) {
        updateStatus('آخرین داده ' + age + ' ثانیه پیش', 'waiting');
        updateEl.textContent = '🟡 در حال دریافت...';
        updateEl.style.color = '#fbbf24';
      } else {
        updateStatus('دستگاه آفلاین - آخرین داده ' + age + ' ثانیه پیش', 'offline');
        updateEl.textContent = '🔴 قطع ارتباط';
        updateEl.style.color = '#f87171';
      }

      // فقط در صورت تغییر داده، آپدیت کن
      if (d.ts !== lastTs) {
        lastTs = d.ts;
      }
    } else {
      updateStatus('منتظر دریافت داده...', 'waiting');
      document.getElementById('lastUpdate').textContent = '⚪ هیچ داده‌ای موجود نیست';
      document.getElementById('lastUpdate').style.color = '#9aa0aa';
    }
  } catch (e) {
    updateStatus('خطا در اتصال به سرور', 'offline');
    document.getElementById('lastUpdate').textContent = '🔴 خطا در ارتباط';
    document.getElementById('lastUpdate').style.color = '#f87171';
  }
}

// اجرای اولیه
updateLive();

// آپدیت هر ۲ ثانیه
setInterval(updateLive, 2000);

// رفرش خودکار اگر داده نیومد (اختیاری)
let refreshTimeout;
function checkData() {
  const statusText = document.getElementById('status').textContent;
  if (statusText.includes('آفلاین') || statusText.includes('خطا')) {
    // سعی کن دوباره وصل شی
    updateLive();
  }
}
setInterval(checkData, 10000);
</script>

</body>
</html>
