<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ШҜШ§ШҙШЁЩҲШұШҜ ШІЩҶШҜЩҮ ЩҫШ§Щ„ШівҖҢШ§Ъ©ШіЫҢЩ…ШӘШұ</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Tahoma, Arial, sans-serif;
    background: #0f1115;
    color: #e8e8e8;
    text-align: center;
    padding: 24px 16px;
    margin: 0;
  }
  h1 { font-weight: 500; margin-bottom: 8px; }
  .cards {
    display: grid;
    grid-template-columns: repeat(2, minmax(160px, 1fr));
    gap: 16px;
    max-width: 520px;
    margin: 20px auto;
  }
  .card {
    background: #1c1f26;
    border-radius: 16px;
    padding: 20px 24px;
    min-height: 150px;
    transition: box-shadow 0.3s ease;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #coCard {
    padding-bottom: 56px;
  }
  .label { font-size: 14px; color: #9aa0aa; margin-bottom: 8px; }
  .value { font-size: 42px; font-weight: 700; }
  .bpm   { color: #ff5c5c; }
  .spo2  { color: #4da3ff; }
  .co    { color: #3ddc84; transition: color 0.3s ease; }
  .co-sub { font-size: 12px; color: #9aa0aa; margin-top: 6px; min-height: 14px; }
  .status { font-size: 13px; color: #9aa0aa; margin-bottom: 8px; }
  .chart-wrap {
    max-width: 900px;
    margin: 0 auto;
    background: #1c1f26;
    border-radius: 16px;
    padding: 16px;
  }
  .legend { display: flex; justify-content: center; gap: 20px; margin-top: 8px; font-size: 13px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  canvas { width: 100%; height: 220px; display: block; }

  .co-card-ok    { box-shadow: 0 0 0 2px #3ddc8433; }
  .co-card-warn  { box-shadow: 0 0 0 2px #f5c542aa; }
  .co-card-alert { box-shadow: 0 0 0 2px #ff5c5caa; }

  .pulse-text {
    font-size: 18px;
    line-height: 1.6;
    min-height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pulse-card-none   { box-shadow: 0 0 0 2px #9aa0aa55; }
  .pulse-card-ok     { box-shadow: 0 0 0 2px #3ddc8433; }
  .pulse-card-danger {
    box-shadow: 0 0 0 2px #ff5c5c;
    animation: pulseBlink 1s infinite;
  }
  @keyframes pulseBlink {
    0%, 100% { box-shadow: 0 0 0 2px #ff5c5c; }
    50%      { box-shadow: 0 0 0 4px #ff2020; }
  }

  #enableSoundBtn {
    display: none;
  }
  .mute-btn {
    position: absolute;
    bottom: 10px;
    left: 10px;
    width: 38px;
    height: 38px;
    border-radius: 8px;
    background: #12141a;
    border: 2px solid #454b57;
    color: #e8e8e8;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .mute-btn.sound-on {
    border-color: #3ddc84;
  }
</style>
</head>
<body>

<h1>вқӨпёҸ ШҜШ§ШҙШЁЩҲШұШҜ ШІЩҶШҜЩҮ ЩҫШ§Щ„ШівҖҢШ§Ъ©ШіЫҢЩ…ШӘШұ</h1>
<div class="status" id="status">ШҜШұ ШӯШ§Щ„ Ш§ШӘШөШ§Щ„...</div>

<div class="cards">
  <div class="card">
    <div class="label">Ш§ШҙШЁШ§Ш№ Ш§Ъ©ШіЫҢЪҳЩҶ (FSpO2)</div>
    <div class="value spo2" id="fspo2">--</div>
  </div>
  <div class="card">
    <div class="label">Ш¶ШұШЁШ§ЩҶ ЩӮЩ„ШЁ (BPM)</div>
    <div class="value bpm" id="bpm">--</div>
  </div>
  <div class="card" id="pulseCard">
    <div class="label">ЩҲШ¶Ш№ЫҢШӘ ЩҶШЁШ¶</div>
    <div class="value pulse-text" id="pulseText">--</div>
  </div>
  <div class="card" id="coCard">
    <button id="muteBtn" class="mute-btn" onclick="toggleSound()" title="ЩҒШ№Ш§Щ„/ШәЫҢШұЩҒШ№Ш§Щ„ Ъ©ШұШҜЩҶ ЩҮШҙШҜШ§Шұ ШөЩҲШӘЫҢ">рҹ”Ү</button>
    <div class="label">Щ…ЩҲЩҶЩҲЪ©ШіЫҢШҜ Ъ©ШұШЁЩҶ (CO ppm)</div>
    <div class="value co" id="co">--</div>
    <div class="co-sub" id="coStatus"></div>
  </div>
</div>

<audio id="alarmAudio" src="alarm.wav" loop preload="auto"></audio>

<div class="chart-wrap">
  <canvas id="liveChart"></canvas>
  <div class="legend">
    <span><span class="dot" style="background:#ff5c5c"></span> BPM</span>
    <span><span class="dot" style="background:#4da3ff"></span> SpO2 %</span>
  </div>
</div>

<div class="chart-wrap" style="margin-top: 16px;">
  <canvas id="waveChart"></canvas>
  <div class="legend">
    <span><span class="dot" style="background:#3ddc84"></span> ШҙЪ©Щ„ Щ…ЩҲШ¬ ЩҶШЁШ¶ (PPG)</span>
  </div>
</div>

<script>
// ---------------------------------------------------------------
// ЩҶЩ…ЩҲШҜШ§Шұ ШІЩҶШҜЩҮвҖҢЫҢ ШіШ§ШҜЩҮ - Ъ©Ш§Щ…Щ„Ш§ЩӢ ШЁШ§ Ш¬Ш§ЩҲШ§Ш§ШіЪ©ШұЫҢЩҫШӘ Ш®Ш§Щ„ШөШҢ ШЁШҜЩҲЩҶ ЩҮЫҢЪҶ
// Ъ©ШӘШ§ШЁШ®ЩҲЩҶЩҮвҖҢЫҢ Ш®Ш§ШұШ¬ЫҢ (ШӘШ§ ЩҲШ§ШЁШіШӘЩҮ ШЁЩҮ CDN ШЁЫҢШұЩҲЩҶЫҢ Ъ©ЩҮ Щ…Щ…Ъ©ЩҶЩҮ ЩҒЫҢЩ„ШӘШұ ШЁШ§ШҙЩҮ ЩҶШЁШ§ШҙЫҢЩ…)
// ---------------------------------------------------------------
const MAX_POINTS = 30;
const bpmData = [];
const spo2Data = [];

const canvas = document.getElementById('liveChart');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawChart();
}
window.addEventListener('resize', resizeCanvas);

// ---------------------------------------------------------------
// ЩҶЩ…ЩҲШҜШ§Шұ ШҙЪ©Щ„ Щ…ЩҲШ¬ ЩҶШЁШ¶ (PPG) - ЩҮЩ…ЩҲЩҶ ШҜШ§ШҜЩҮвҖҢЫҢ Ш®Ш§Щ…ЫҢ Ъ©ЩҮ ШұЩҲЫҢ OLED ШҜЫҢШҜЩҮ Щ…ЫҢвҖҢШҙЩҮШҢ
// ЩҮШұ ШЁШ§Шұ Ъ©ЩҮ ЫҢЪ© ШЁШіШӘЩҮвҖҢЫҢ Ш¬ШҜЫҢШҜ Ш§ШІ ШЁЩҲШұШҜ Щ…ЫҢвҖҢШұШіЩҮ (ЩҮШұ ~1 Ш«Ш§ЩҶЫҢЩҮ) Ъ©Ш§Щ…Щ„ ШЁШ§ШІШұШіЩ… Щ…ЫҢвҖҢШҙЩҮ
// ---------------------------------------------------------------
const waveCanvas = document.getElementById('waveChart');
const waveCtx = waveCanvas.getContext('2d');
let lastWave = null;

function resizeWaveCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = waveCanvas.getBoundingClientRect();
  waveCanvas.width = rect.width * dpr;
  waveCanvas.height = rect.height * dpr;
  waveCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawWave(lastWave);
}
window.addEventListener('resize', resizeWaveCanvas);

function drawWave(waveArr) {
  const w = waveCanvas.getBoundingClientRect().width;
  const h = waveCanvas.getBoundingClientRect().height;
  waveCtx.clearRect(0, 0, w, h);

  waveCtx.strokeStyle = '#2a2e37';
  waveCtx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = (h / 4) * i;
    waveCtx.beginPath();
    waveCtx.moveTo(0, y);
    waveCtx.lineTo(w, y);
    waveCtx.stroke();
  }

  if (!waveArr || waveArr.length < 2) return;

  const minV = Math.min(...waveArr);
  const maxV = Math.max(...waveArr);
  const range = (maxV - minV) || 1;

  waveCtx.strokeStyle = '#3ddc84';
  waveCtx.lineWidth = 2;
  waveCtx.beginPath();
  waveArr.forEach((val, i) => {
    const x = (i / (waveArr.length - 1)) * w;
    const y = h - ((val - minV) / range) * h;
    if (i === 0) waveCtx.moveTo(x, y);
    else waveCtx.lineTo(x, y);
  });
  waveCtx.stroke();
}

function drawChart() {
  const w = canvas.getBoundingClientRect().width;
  const h = canvas.getBoundingClientRect().height;
  ctx.clearRect(0, 0, w, h);

  // Ш®Ш·ЩҲШ· ШұШ§ЩҮЩҶЩ…Ш§ЫҢ Ш§ЩҒЩӮЫҢ
  ctx.strokeStyle = '#2a2e37';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = (h / 4) * i;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  if (bpmData.length < 2) return;

  const allValues = [...bpmData, ...spo2Data].filter(v => v != null);
  if (allValues.length === 0) return;
  const minV = Math.min(...allValues) - 5;
  const maxV = Math.max(...allValues) + 5;
  const range = maxV - minV || 1;

  function drawLine(data, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    data.forEach((val, i) => {
      if (val == null) return;
      const x = (i / (MAX_POINTS - 1)) * w;
      const y = h - ((val - minV) / range) * h;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  drawLine(bpmData, '#ff5c5c');
  drawLine(spo2Data, '#4da3ff');
}

// ---------------------------------------------------------------
// ШўЪҳЫҢШұ ШөЩҲШӘЫҢ ШіШ§ЫҢШӘ - ЩҫШ®Шҙ ЩҒШ§ЫҢЩ„ alarm.wav (Щ„ЩҲЩҫвҖҢШҙЩҲЩҶШҜЩҮ)ШҢ Ъ©ЩҶШӘШұЩ„ ШЁШ§ ШҜЪ©Щ…ЩҮвҖҢЫҢ
// Ъ©ЩҲЪҶЪ© ШҜШ§Ш®Щ„ Ъ©Ш§ШұШӘ CO. Щ…ШұЩҲШұЪҜШұЩҮШ§ ШЁШҜЩҲЩҶ ЫҢЪ© ШӘШ№Ш§Щ…Щ„ Ъ©Ш§ШұШЁШұ Ш§Ш¬Ш§ШІЩҮвҖҢЫҢ ЩҫШ®Шҙ Ш®ЩҲШҜЪ©Ш§Шұ
// ШөШҜШ§ ЩҶЩ…ЫҢвҖҢШҜЩҶШҢ ШЁШұШ§ЫҢ ЩҮЩ…ЫҢЩҶ Ъ©Щ„ЫҢЪ© ШұЩҲЫҢ ШҜЪ©Щ…ЩҮ ЩҮЩ… ЩҒШ№Ш§Щ„/ШәЫҢШұЩҒШ№Ш§Щ„ Щ…ЫҢвҖҢЪ©ЩҶЩҮ ЩҲ ЩҮЩ…
// (ШЁШ§Шұ Ш§ЩҲЩ„) Ш§Ш¬Ш§ШІЩҮвҖҢЫҢ ЩҫШ®Шҙ ШұЩҲ Ш§ШІ Щ…ШұЩҲШұЪҜШұ Щ…ЫҢвҖҢЪҜЫҢШұЩҮ.
// ---------------------------------------------------------------
const alarmAudio = document.getElementById('alarmAudio');
let soundEnabled = false;
let alarmActive = false;
let coAlarmOn = false;
let pulseAlarmOn = false;

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('muteBtn');
  btn.textContent = soundEnabled ? 'рҹ”Ҡ' : 'рҹ”Ү';
  btn.classList.toggle('sound-on', soundEnabled);

  if (soundEnabled) {
    if (alarmActive) {
      alarmAudio.currentTime = 0;
      alarmAudio.play().catch(() => {});
    } else {
      // ЫҢЪ© play/pause ШіШұЫҢШ№ ЩҒЩӮШ· ШЁШұШ§ЫҢ ЪҜШұЩҒШӘЩҶ Ш§Ш¬Ш§ШІЩҮвҖҢЫҢ ЩҫШ®Шҙ Ш§ШІ Щ…ШұЩҲШұЪҜШұ
      alarmAudio.play().then(() => alarmAudio.pause()).catch(() => {});
    }
  } else {
    alarmAudio.pause();
  }
}

function updateSirenState() {
  const shouldAlarm = coAlarmOn || pulseAlarmOn;
  if (shouldAlarm === alarmActive) return;
  alarmActive = shouldAlarm;

  if (alarmActive && soundEnabled) {
    alarmAudio.currentTime = 0;
    alarmAudio.play().catch(() => {});
  } else if (!alarmActive) {
    alarmAudio.pause();
  }
}

// ---------------------------------------------------------------
// ЩҲШ¶Ш№ЫҢШӘ ЩҶШЁШ¶: 0 = Ш§ЩҶЪҜШҙШӘ ШұЩҲЫҢ ШіЩҶШіЩҲШұ ЩҶЫҢШіШӘШҢ 1 = ЩҶШЁШ¶ Ш·ШЁЫҢШ№ЫҢШҢ 2 = ЩҶШЁШ¶ ЩӮШ·Ш№ (Ш®Ш·Шұ)
// ---------------------------------------------------------------
function updatePulseDisplay(status) {
  const textEl = document.getElementById('pulseText');
  const cardEl = document.getElementById('pulseCard');
  cardEl.classList.remove('pulse-card-none', 'pulse-card-ok', 'pulse-card-danger');

  if (status === 2) {
    textEl.textContent = 'рҹҡЁ ЩҶШЁШ¶ ЩӮШ·Ш№ ШҙШҜЩҮ - Ш®Ш·Шұ Щ…ШұЪҜ';
    textEl.style.color = '#ff5c5c';
    cardEl.classList.add('pulse-card-danger');
    pulseAlarmOn = true;
  } else if (status === 1) {
    textEl.textContent = 'Ш§ЩҶЪҜШҙШӘ ЩӮШұШ§Шұ ЪҜШұЩҒШӘЩҮ - ЩҶШЁШ¶ Ш·ШЁЫҢШ№ЫҢ';
    textEl.style.color = '#3ddc84';
    cardEl.classList.add('pulse-card-ok');
    pulseAlarmOn = false;
  } else {
    textEl.textContent = 'Ш§ЩҶЪҜШҙШӘ ШҙЩҶШ§ШіШ§ЫҢЫҢ ЩҶШҙШҜ';
    textEl.style.color = '#9aa0aa';
    cardEl.classList.add('pulse-card-none');
    pulseAlarmOn = false;
  }
  updateSirenState();
}

// ---------------------------------------------------------------
// ЩҲШ¶Ш№ЫҢШӘ ШұЩҶЪҜЫҢ CO ШЁШұ Ш§ШіШ§Ші ШўШіШӘШ§ЩҶЩҮвҖҢЩҮШ§ЫҢ Ш§ШіШӘШ§ЩҶШҜШ§ШұШҜ ШіЩ„Ш§Щ…ШӘЫҢ
// ---------------------------------------------------------------
function updateCoDisplay(ppm) {
  const coEl = document.getElementById('co');
  const subEl = document.getElementById('coStatus');
  const cardEl = document.getElementById('coCard');

  coEl.textContent = (ppm ?? '--');
  cardEl.classList.remove('co-card-ok', 'co-card-warn', 'co-card-alert');

  if (ppm == null) {
    coEl.style.color = '#9aa0aa';
    subEl.textContent = '';
    coAlarmOn = false;
    updateSirenState();
    return;
  }

  if (ppm < 9) {
    coEl.style.color = '#3ddc84';
    subEl.textContent = 'Ш·ШЁЫҢШ№ЫҢ';
    cardEl.classList.add('co-card-ok');
    coAlarmOn = false;
  } else if (ppm < 35) {
    coEl.style.color = '#f5c542';
    subEl.textContent = 'ЩӮШ§ШЁЩ„ ЩӮШЁЩҲЩ„ - ШӘЩҮЩҲЫҢЩҮ ШҙЩҲШҜ';
    cardEl.classList.add('co-card-warn');
    coAlarmOn = false;
  } else if (ppm < 100) {
    coEl.style.color = '#ff9d42';
    subEl.textContent = 'вҡ пёҸ ЩҮШҙШҜШ§Шұ';
    cardEl.classList.add('co-card-warn');
    coAlarmOn = false;
  } else {
    coEl.style.color = '#ff5c5c';
    subEl.textContent = 'рҹҡЁ Ш®Ш·Шұ - ШўЪҳЫҢШұ ЩҒШ№Ш§Щ„';
    cardEl.classList.add('co-card-alert');
    coAlarmOn = true;
  }
  updateSirenState();
}

let lastTs = null;

async function updateLive() {
  try {
    const res = await fetch('/api/readings/latest');
    const d = await res.json();

    if (d && typeof d.bpm === 'number') {
      document.getElementById('bpm').textContent = d.bpm;
      document.getElementById('fspo2').textContent = d.fspo2 ?? d.spo2 ?? '--';
      updateCoDisplay(typeof d.co_ppm === 'number' ? Math.round(d.co_ppm) : null);
      updatePulseDisplay(typeof d.pulse_status === 'number' ? d.pulse_status : 0);

      const age = Math.round((Date.now() - d.ts) / 1000);
      document.getElementById('status').textContent =
        age < 10 ? 'рҹҹў ШІЩҶШҜЩҮ - ШўШ®ШұЫҢЩҶ ШЁШұЩҲШІШұШіШ§ЩҶЫҢ ' + age + ' Ш«Ш§ЩҶЫҢЩҮ ЩҫЫҢШҙ'
                  : 'рҹҹ  ШўШ®ШұЫҢЩҶ ШҜШ§ШҜЩҮ ' + age + ' Ш«Ш§ЩҶЫҢЩҮ ЩҫЫҢШҙ (Щ…Щ…Ъ©ЩҶЩҮ ШҜШіШӘЪҜШ§ЩҮ ШўЩҒЩ„Ш§ЫҢЩҶ ШЁШ§ШҙЩҮ)';

      if (d.ts !== lastTs) {
        lastTs = d.ts;
        bpmData.push(d.bpm);
        spo2Data.push(d.fspo2 ?? d.spo2);
        if (bpmData.length > MAX_POINTS) bpmData.shift();
        if (spo2Data.length > MAX_POINTS) spo2Data.shift();
        drawChart();

        if (Array.isArray(d.wave) && d.wave.length > 1) {
          lastWave = d.wave;
          drawWave(lastWave);
        }
      }
    } else {
      document.getElementById('status').textContent = 'вҡӘ ЩҮЩҶЩҲШІ ШҜШ§ШҜЩҮвҖҢШ§ЫҢ ШҜШұЫҢШ§ЩҒШӘ ЩҶШҙШҜЩҮ';
    }
  } catch (e) {
    document.getElementById('status').textContent = 'рҹ”ҙ Ш®Ш·Ш§ ШҜШұ Ш§ШӘШөШ§Щ„ ШЁЩҮ ШіШұЩҲШұ';
  }
}

resizeCanvas();
resizeWaveCanvas();
updateLive();
setInterval(updateLive, 2000);
</script>

</body>
</html>
